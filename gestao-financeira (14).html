<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Financeira</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{--bg:#0c0a1a;--bg2:#151027;--card:rgba(255,255,255,0.035);--brd:rgba(255,255,255,0.06);--bf:rgba(139,92,246,0.5);--t1:#e8e4f0;--t2:#a09bbd;--t3:#6b6589;--vi:#8b5cf6;--in:#6366f1;--pk:#ec4899;--rd:#f87171;--am:#f59e0b;--gn:#10b981;--em:#34d399;--cy:#06b6d4;--bl:#3b82f6;--r:16px;--rs:10px;--m:'JetBrains Mono',monospace;--s:'Outfit',sans-serif}
body.light{--bg:#f0f0f5;--bg2:#e8e8f0;--card:rgba(0,0,0,0.03);--brd:rgba(0,0,0,0.08);--bf:rgba(99,102,241,0.4);--t1:#1a1a2e;--t2:#4a4a6a;--t3:#8888a0;background:linear-gradient(155deg,#f4f4f8,#eeeef5,#e8e8f2)!important;color:var(--t1)}
body.light ::-webkit-scrollbar-thumb{background:#c0c0d0}
body.light .gl{background:rgba(255,255,255,0.7);border-color:rgba(0,0,0,0.08)}
body.light .tb,body.light .btn.bo{background:rgba(0,0,0,0.04);color:var(--t2);border-color:rgba(0,0,0,0.1)}
body.light .tb.a,body.light .btn.bo.a{background:rgba(99,102,241,0.12);color:#4f46e5;border-color:rgba(99,102,241,0.3)}
body.light .fd input,body.light .fd select,body.light .fl select,body.light .fl input{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.12);color:var(--t1)}
body.light .fd select option,body.light .fl select option{background:#fff;color:#1a1a2e}
body.light .tr:hover{background:rgba(0,0,0,0.03)}
body.light .tg{border:1px solid rgba(0,0,0,0.06)}
body.light .ov{background:rgba(255,255,255,0.6)}
body.light .ml{background:#fff;border-color:rgba(0,0,0,0.1)}
body.light .paid-btn.y{background:rgba(16,185,129,0.12);color:#047857}
body.light .paid-btn.n{background:rgba(245,158,11,0.12);color:#b45309}
body.light .chip{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.1);color:var(--t1)}
body.light .chip-a{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.2);color:#4f46e5}
body.light .logo{background:linear-gradient(135deg,#6366f1,#4f46e5,#ec4899);-webkit-background-clip:text}
body.light .ct{color:#4f46e5}
body.light .ic{background:rgba(0,0,0,0.025);border-color:rgba(0,0,0,0.06)}
*{box-sizing:border-box;margin:0;padding:0}html{font-size:14px}body{font-family:var(--s);background:linear-gradient(155deg,var(--bg),var(--bg2),#1a0e2e);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#3f3566;border-radius:10px}
.app{max-width:1120px;margin:0 auto;padding:20px 18px 60px}
.gl{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--brd);border-radius:var(--r)}
.hdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.logo{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#c4b5fd,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-s{font-size:.75rem;color:var(--t3);margin-top:1px}
.btn{padding:8px 16px;border-radius:var(--rs);border:none;font-family:var(--s);font-weight:600;font-size:.8rem;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-1px)}.bp{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.bg{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.bo{background:rgba(255,255,255,.05);color:var(--t2);border:1px solid var(--brd)}.bo.a{background:rgba(99,102,241,.18);color:#a78bfa;border-color:rgba(99,102,241,.35)}
.bd{background:rgba(239,68,68,.12);color:#fca5a5}.bs{padding:4px 9px;font-size:.7rem;border-radius:8px}
.nav{display:flex;gap:5px;flex-wrap:wrap}
.tb{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--brd);background:transparent;color:var(--t2);font-family:var(--s);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.tb:hover{background:rgba(255,255,255,.04)}.tb.a{background:rgba(99,102,241,.18);color:#a78bfa;border-color:rgba(99,102,241,.35)}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px;margin-bottom:14px}
.sc{padding:15px 17px;position:relative;overflow:hidden}.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r) var(--r) 0 0}
.sc.rd::before{background:linear-gradient(90deg,#ef4444,#f87171)}.sc.gn::before{background:linear-gradient(90deg,#10b981,#34d399)}.sc.vi::before{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}.sc.cy::before{background:linear-gradient(90deg,#06b6d4,#22d3ee)}.sc.am::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.sl{font-size:.63rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}.sv{font-size:1.35rem;font-weight:800;font-family:var(--m)}.ss{font-size:.68rem;color:var(--t3);margin-top:3px}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.fd label{display:block;font-size:.66rem;color:var(--t3);margin-bottom:3px;font-weight:500}
.fd input,.fd select{width:100%;padding:8px 10px;background:rgba(255,255,255,.05);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-family:var(--s);font-size:.83rem;outline:none;transition:border-color .2s}
.fd input:focus,.fd select:focus{border-color:var(--bf)}.fd select option{background:#1a0e2e;color:var(--t1)}
.fl{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px;align-items:center}
.fl select,.fl input{padding:7px 10px;background:rgba(255,255,255,.05);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-family:var(--s);font-size:.78rem;outline:none;min-width:100px}
.fl select option{background:#1a0e2e}
.th{display:grid;grid-template-columns:30px 68px .9fr .7fr .65fr 1fr 95px 60px 60px 38px;gap:4px;padding:8px 11px;border-bottom:1px solid var(--brd);font-size:.62rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.tr{display:grid;grid-template-columns:30px 68px .9fr .7fr .65fr 1fr 95px 60px 60px 38px;gap:4px;padding:7px 11px;border-bottom:1px solid rgba(255,255,255,.02);align-items:center;font-size:.8rem;transition:background .15s}
.tr:hover{background:rgba(255,255,255,.02)}
.tbd{max-height:430px;overflow-y:auto}
.tft{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:10px 11px;border-top:1px solid var(--brd);background:rgba(255,255,255,.015)}
.tg{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:20px;font-size:.65rem;font-weight:500;white-space:nowrap}
.ti{background:rgba(16,185,129,.15);color:#6ee7b7}.to{background:rgba(239,68,68,.12);color:#fca5a5}
.chg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.chb{padding:15px;min-height:270px}.ct{font-size:.86rem;font-weight:700;color:#c4b5fd;margin-bottom:11px}
canvas{width:100%!important}
.cr{display:flex;align-items:center;gap:7px;padding:5px 0}.ci{font-size:1rem;width:24px;text-align:center}
.cbt{height:4px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden;flex:1}
.cbf{height:100%;border-radius:10px;transition:width .6s}
.cn{font-size:.78rem;font-weight:600;min-width:100px}.cvl{font-size:.78rem;font-weight:700;font-family:var(--m);min-width:82px;text-align:right}
.cp{font-size:.68rem;color:var(--t3);font-family:var(--m);min-width:38px;text-align:right}
.ig{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.ic{padding:13px;border-radius:13px;background:rgba(255,255,255,.025);border:1px solid var(--brd)}
.ict{display:flex;align-items:center;gap:5px;font-size:.82rem;font-weight:700;margin-bottom:4px}
.icx{font-size:.78rem;color:var(--t2);line-height:1.4}
.bb{display:flex;height:6px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,.04)}
.bbi{background:linear-gradient(90deg,#059669,#10b981);transition:width .6s}.bbe{background:linear-gradient(90deg,#ef4444,#f87171);transition:width .6s}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:14px}
.ml{background:#1a1030;border:1px solid var(--brd);border-radius:var(--r);padding:20px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto}
.ml h3{font-size:1rem;font-weight:700;margin-bottom:13px}
.tgl{display:flex;gap:3px;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;border:1px solid var(--brd)}
.tgo{padding:6px 13px;border-radius:8px;border:none;font-family:var(--s);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--t3)}
.tgo.te.a{background:rgba(239,68,68,.18);color:#fca5a5}.tgo.ti.a{background:rgba(16,185,129,.18);color:#6ee7b7}
.ch{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:2px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid var(--brd);font-size:.76rem;color:var(--t1)}
.chip button{background:none;border:none;color:#f87171;cursor:pointer;font-size:.75rem;padding:0 0 0 2px;line-height:1}
.chip-eb{color:#a78bfa!important}
.chip-a{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.3);color:#a78bfa;cursor:pointer}.chip-a:hover{background:rgba(99,102,241,.2)}
.sp{flex:1}.fade{animation:fi .3s ease-out}
.paid-btn{border:none;border-radius:20px;padding:2px 8px;font-size:.65rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--s)}
.paid-btn.y{background:rgba(16,185,129,.15);color:#6ee7b7}.paid-btn.n{background:rgba(245,158,11,.15);color:#fcd34d}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.emp{text-align:center;padding:35px 18px;color:var(--t3)}
.st{margin-bottom:16px}.stt{font-size:.82rem;font-weight:700;color:#c4b5fd;margin-bottom:7px}
.paydate-badge{font-size:.58rem;padding:1px 5px;border-radius:6px;background:rgba(6,182,212,.12);color:#67e8f9;font-family:var(--m);white-space:nowrap}
@media(max-width:700px){.chg{grid-template-columns:1fr}.th,.tr{grid-template-columns:26px 58px 1fr .8fr 85px 50px 34px}.th>:nth-child(4),.tr>:nth-child(4),.th>:nth-child(5),.tr>:nth-child(5),.th>:nth-child(8),.tr>:nth-child(8){display:none}.cg{grid-template-columns:1fr 1fr}.fg{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const DC=[{n:"Moradia",i:"🏠",c:"#6366f1"},{n:"Alimentação",i:"🍽️",c:"#f59e0b"},{n:"Transporte",i:"🚗",c:"#3b82f6"},{n:"Lazer",i:"🎉",c:"#ec4899"},{n:"Saúde",i:"💊",c:"#10b981"},{n:"Educação",i:"📚",c:"#8b5cf6"},{n:"Vestuário",i:"👗",c:"#f97316"},{n:"Assinaturas",i:"📱",c:"#06b6d4"},{n:"Contas",i:"💡",c:"#ef4444"},{n:"Bebidas",i:"🍺",c:"#a855f7"},{n:"Pet",i:"🐾",c:"#84cc16"},{n:"Parcelas Fixas",i:"🔒",c:"#dc2626"},{n:"Trabalho",i:"💼",c:"#3b82f6"},{n:"Outros",i:"📦",c:"#78716c"}];
const DI=[{n:"Salário",i:"💼",c:"#10b981"},{n:"Freelance",i:"💻",c:"#06b6d4"},{n:"Bônus",i:"🎁",c:"#f59e0b"},{n:"Reembolso",i:"🔄",c:"#3b82f6"},{n:"Investimentos",i:"📈",c:"#8b5cf6"},{n:"Presente",i:"🎀",c:"#ec4899"},{n:"Outros",i:"💰",c:"#78716c"}];
const DP=["Pessoa 1","Pessoa 2"];
const DG=["Aluguel","Comida","Cartão 1","Cartão 2","Cartão 3"];
const DPY=["Pix","Cartão 1","Cartão 2","Cartão 3","Dinheiro","Boleto"];
const TY=["Essencial","Não Essencial","Fixo"],MO=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const PC=["#6366f1","#10b981","#f59e0b","#ec4899","#3b82f6","#8b5cf6","#06b6d4","#ef4444","#84cc16","#f97316","#a855f7","#dc2626","#78716c","#22d3ee","#fbbf24"];
const fmt=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtPDF=v=>"R$ "+v.toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
const uid=()=>"e"+Date.now()+"_"+Math.random().toString(36).slice(2,6);

// ── Undo/Redo (dual stack)
let uStk=[],rStk=[];
function hPush(){uStk.push(JSON.stringify(S.entries));rStk=[];if(uStk.length>40)uStk.shift();}
function undo(){if(!uStk.length)return;rStk.push(JSON.stringify(S.entries));S.entries=JSON.parse(uStk.pop());sv();R();}
function redo(){if(!rStk.length)return;uStk.push(JSON.stringify(S.entries));S.entries=JSON.parse(rStk.pop());sv();R();}

// ── Zoom
let zoomLvl=100;
function zIn(){zoomLvl=Math.min(150,zoomLvl+10);document.querySelector('.app').style.zoom=(zoomLvl/100);svZoom();R();}
function zOut(){zoomLvl=Math.max(60,zoomLvl-10);document.querySelector('.app').style.zoom=(zoomLvl/100);svZoom();R();}
function svZoom(){try{localStorage.setItem('fin-zoom',zoomLvl);}catch{}}
function ldZoom(){try{const z=localStorage.getItem('fin-zoom');if(z)zoomLvl=parseInt(z);}catch{}}

// ── Theme
let isDark=true;
function toggleTheme(){isDark=!isDark;document.body.classList.toggle('light',!isDark);try{localStorage.setItem('fin-theme',isDark?'dark':'light');}catch{}R();}
function ldTheme(){try{const t=localStorage.getItem('fin-theme');if(t==='light'){isDark=false;document.body.classList.add('light');}}catch{}}

// fpmt = filtro forma de pagamento | fday = filtro dia do mês (payDate)
let S={entries:[],cfg:{persons:[...DP],cats:DC.map(c=>({...c})),incCats:DI.map(c=>({...c})),groups:[...DG],pay:[...DPY]},view:"dashboard",fp:"Todos",fm:"Todos",fc:"Todos",fg:"Todos",fk:"Todos",fpa:"Todos",fpmt:"Todos",fday:"Todos",se:"",sb:"date",sd:"desc",sm:false,ei:null,mk:"expense"};
const SK="fin-v8",SC="fin-cfg-v8";
function cm(n){return S.cfg.cats.find(c=>c.n===n)||S.cfg.incCats.find(c=>c.n===n)||{n,i:"📦",c:"#78716c"};}

const SEED=[];
async function ld(){try{let r=await window.storage.get(SK);if(r?.value){S.entries=JSON.parse(r.value);}else{S.entries=[...SEED];}r=await window.storage.get(SC);if(r?.value){const c=JSON.parse(r.value);S.cfg={...S.cfg,...c};}}catch{try{let r=localStorage.getItem(SK);if(r)S.entries=JSON.parse(r);else S.entries=[...SEED];r=localStorage.getItem(SC);if(r){const c=JSON.parse(r);S.cfg={...S.cfg,...c};}}catch{S.entries=[...SEED];}}if(S.entries.length===0)S.entries=[...SEED];sv();R();}
async function sv(){const j=JSON.stringify(S.entries),jc=JSON.stringify(S.cfg);try{await window.storage.set(SK,j);await window.storage.set(SC,jc);}catch{}try{localStorage.setItem(SK,j);localStorage.setItem(SC,jc);}catch{}}

// Retorna o mês MO[] da data de pagamento (payDate) ou fallback para campo month
function eMonth(e){if(e.payDate){try{return MO[new Date(e.payDate+"T12:00:00").getMonth()];}catch{}}return e.month;}
// Retorna o dia do mês da data de pagamento
function eDay(e){if(e.payDate){try{return new Date(e.payDate+"T12:00:00").getDate();}catch{}}return null;}

function gF(){return S.entries.filter(e=>{
  if(S.fp!=="Todos"&&e.person!==S.fp)return false;
  if(S.fm!=="Todos"&&eMonth(e)!==S.fm)return false;
  if(S.fday!=="Todos"){const d=eDay(e);if(d!==parseInt(S.fday))return false;}
  if(S.fk!=="Todos"&&e.kind!==S.fk)return false;
  if(S.fc!=="Todos"&&e.category!==S.fc)return false;
  if(S.fg!=="Todos"&&e.group!==S.fg)return false;
  if(S.fpmt!=="Todos"&&e.pay!==S.fpmt)return false;
  if(S.fpa==="Pago"&&!e.paid)return false;
  if(S.fpa==="Pendente"&&e.paid)return false;
  if(S.se&&!e.desc.toLowerCase().includes(S.se.toLowerCase()))return false;
  return true;
}).sort((a,b)=>{const d=S.sd==="asc"?1:-1;if(S.sb==="value")return(a.value-b.value)*d;if(S.sb==="date"){const da=a.payDate||a.date||"",db=b.payDate||b.date||"";return da.localeCompare(db)*d;}return a.category.localeCompare(b.category)*d;});}

function sBy(l,k){const m={};l.forEach(e=>{const v=e[k];if(v)m[v]=(m[v]||0)+e.value;});return Object.entries(m).map(([n,v])=>({name:n,value:Math.round(v*100)/100})).sort((a,b)=>b.value-a.value);}

// Canvas
function sC(id,ht){const c=document.getElementById(id);if(!c)return null;const x=c.getContext("2d"),d=devicePixelRatio||1,w=c.parentElement.clientWidth;c.width=w*d;c.height=ht*d;c.style.width=w+"px";c.style.height=ht+"px";x.scale(d,d);x.clearRect(0,0,w,ht);return{x,w,h:ht};}
function rR(x,px,py,pw,ph,r){if(ph<1)return;r=Math.min(r,pw/2,ph/2);x.beginPath();x.moveTo(px+r,py);x.arcTo(px+pw,py,px+pw,py+ph,r);x.arcTo(px+pw,py+ph,px,py+ph,0);x.lineTo(px,py+ph);x.arcTo(px,py,px+r,py,r);x.closePath();}

function dDon(id,data,total,useCm){
  const c=sC(id,230);if(!c)return;const{x,w,h}=c;
  if(!data.length||!total){x.fillStyle="#6b6589";x.font="13px Outfit";x.textAlign="center";x.fillText("Sem dados",w/2,h/2);return;}
  const cx=w/2,cy=h/2,oR=84,iR=54;let a=-Math.PI/2;
  data.forEach((d,i)=>{const sl=(d.value/total)*Math.PI*2;x.beginPath();x.arc(cx,cy,oR,a,a+sl);x.arc(cx,cy,iR,a+sl,a,true);x.closePath();x.fillStyle=useCm?cm(d.name).c:PC[i%PC.length];x.fill();a+=sl;});
  x.fillStyle="#e8e4f0";x.font="bold 15px 'JetBrains Mono'";x.textAlign="center";x.textBaseline="middle";x.fillText(fmt(total),cx,cy-5);x.fillStyle="#8b7fad";x.font="10px Outfit";x.fillText("total",cx,cy+12);
  let ly=h-Math.min(data.length,5)*15;
  data.slice(0,5).forEach((d,i)=>{x.fillStyle=useCm?cm(d.name).c:PC[i%PC.length];x.beginPath();x.arc(9,ly+4,3,0,Math.PI*2);x.fill();x.fillStyle="#a09bbd";x.font="10px Outfit";x.textAlign="left";x.fillText(`${d.name} (${((d.value/total)*100).toFixed(0)}%)`,17,ly+7);ly+=15;});
}

function dBars(id,eM,iM){
  const c=sC(id,230);if(!c)return;const{x,w,h}=c;const ms=MO.filter(m=>eM[m]||iM[m]);
  if(!ms.length){x.fillStyle="#6b6589";x.font="13px Outfit";x.textAlign="center";x.fillText("Sem dados",w/2,h/2);return;}
  const mx=Math.max(...ms.map(m=>Math.max(eM[m]||0,iM[m]||0)),1);
  const pL=48,pR=10,pT=8,pB=32,cW=w-pL-pR,cH=h-pT-pB,gap=cW/ms.length,bW=Math.min(14,gap*.34);
  x.strokeStyle="rgba(255,255,255,.04)";x.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pT+cH*(1-i/4);x.beginPath();x.moveTo(pL,y);x.lineTo(w-pR,y);x.stroke();x.fillStyle="#6b6589";x.font="8px 'JetBrains Mono'";x.textAlign="right";x.fillText(`${((mx*i/4)/1000).toFixed(1)}k`,pL-4,y+3);}
  const gI=x.createLinearGradient(0,pT,0,pT+cH);gI.addColorStop(0,"#34d399");gI.addColorStop(1,"#059669");
  const gE=x.createLinearGradient(0,pT,0,pT+cH);gE.addColorStop(0,"#f87171");gE.addColorStop(1,"#dc2626");
  ms.forEach((m,i)=>{const cx2=pL+i*gap+gap/2;
    let ih=(iM[m]||0)/mx*cH;if(ih>=1){x.fillStyle=gI;rR(x,cx2-bW-1,pT+cH-ih,bW,ih,3);x.fill();}
    let eh=(eM[m]||0)/mx*cH;if(eh>=1){x.fillStyle=gE;rR(x,cx2+1,pT+cH-eh,bW,eh,3);x.fill();}
    x.fillStyle="#c4b5fd";x.font="bold 9px Outfit";x.textAlign="center";x.fillText(m,cx2,pT+cH+14);
  });
  x.fillStyle="#34d399";x.beginPath();x.arc(w-90,10,3,0,Math.PI*2);x.fill();x.fillStyle="#a09bbd";x.font="9px Outfit";x.textAlign="left";x.fillText("Receita",w-84,13);
  x.fillStyle="#f87171";x.beginPath();x.arc(w-38,10,3,0,Math.PI*2);x.fill();x.fillText("Gasto",w-32,13);
}

  });
  doc.autoTable({startY:yBase+13,head:[["Tipo","Dt.Pgto","Pessoa","Categoria","Grupo","Descrição","Forma Pgto","Valor","Status"]],body:rows,styles:{fontSize:6.5,cellPadding:2,font:"helvetica"},headStyles:{fillColor:[99,102,241],textColor:255,fontStyle:"bold",fontSize:6.5},alternateRowStyles:{fillColor:[245,245,255]},columnStyles:{7:{halign:"right",fontStyle:"bold"},8:{halign:"center"}},didParseCell:function(d){if(d.section==='body'&&d.column.index===7)d.cell.styles.textColor=d.cell.raw.startsWith("+")?[16,185,129]:[239,68,68];if(d.section==='body'&&d.column.index===8)d.cell.styles.textColor=d.cell.raw==="Pago"?[16,185,129]:[245,158,11];}});
  let fy=doc.lastAutoTable.finalY+10;

  doc.save(fname);
}

// ── Actions
function V(v){S.view=v;R();}
function F(k,v){S[k]=v;R();}
function cF(){S.fp="Todos";S.fm="Todos";S.fc="Todos";S.fg="Todos";S.fk="Todos";S.fpa="Todos";S.fpmt="Todos";S.fday="Todos";S.se="";R();}
function tS(k){if(S.sb===k)S.sd=S.sd==="asc"?"desc":"asc";else{S.sb=k;S.sd="desc";}R();}
function tP(id){const e=S.entries.find(x=>x.id===id);if(e){hPush();e.paid=!e.paid;sv();R();}}
function oM(id,k){S.sm=true;S.ei=id||null;S.mk=k||"expense";R();}
function cM(){S.sm=false;S.ei=null;R();}
function eE(id){const e=S.entries.find(x=>x.id===id);if(e)oM(id,e.kind);}
function dE(id){
  const e=S.entries.find(x=>x.id===id);if(!e)return;
  hPush();
  // Check if part of a recurring group (iG)
  if(e.iG){
    const related=S.entries.filter(x=>x.iG===e.iG);
    if(related.length>1){
      if(!confirm(`Excluir todos os ${related.length} lançamentos de "${e.desc}"?`))return;
      const ids=new Set(related.map(x=>x.id));
      S.entries=S.entries.filter(x=>!ids.has(x.id));
      sv();R();return;
    }
  }
  // Check if it's installment 1/N (for entries without iG)
  const m=e.desc.match(/^(.+?)\s*1\/(\d+)$/);
  if(m){
    const base=m[1].trim(),tot=parseInt(m[2]);
    const related=S.entries.filter(x=>{
      if(x.person!==e.person||x.category!==e.category)return false;
      const rm=x.desc.match(/^(.+?)\s*(\d+)\/(\d+)$/);
      if(!rm)return false;
      return rm[1].trim()===base&&parseInt(rm[3])===tot;
    });
    if(related.length>1){
      if(!confirm(`Excluir todas as ${related.length} parcelas de "${base}"?`))return;
      const ids=new Set(related.map(x=>x.id));
      S.entries=S.entries.filter(x=>!ids.has(x.id));
      sv();R();return;
    }
  }
  if(!confirm("Excluir este lançamento?"))return;
  S.entries=S.entries.filter(x=>x.id!==id);sv();R();
}

function sE(kind){
  const desc=document.getElementById("fde").value.trim(),val=parseFloat(document.getElementById("fvl").value);
  if(!desc||isNaN(val)||val<=0){alert("Preencha descrição e valor.");return;}
  const tyEl=document.getElementById("fty"),icb=document.getElementById("fins"),isI2=icb&&icb.checked,iN=isI2?parseInt(document.getElementById("fin").value)||1:1;
  const recCb=document.getElementById("frec"),isRec=recCb&&recCb.checked,recN=isRec?parseInt(document.getElementById("fren").value)||1:1;
  const pdEl=document.getElementById("fpd"),isPaid=pdEl&&pdEl.value==="1";
  const payDate=document.getElementById("fpay")?.value||"";
  const isIncome=kind==="income";
  const dateVal=isIncome?payDate:document.getElementById("fdt").value;
  hPush();
  const d={kind,person:document.getElementById("fp").value,month:document.getElementById("fmo").value,date:dateVal,payDate:isIncome?payDate:payDate,category:document.getElementById("fca").value,group:document.getElementById("fgr").value,desc,value:val,type:tyEl?tyEl.value:"",pay:document.getElementById("fpy").value,paid:isPaid};
  if(S.ei){const idx=S.entries.findIndex(e=>e.id===S.ei);if(idx>=0)S.entries[idx]={...S.entries[idx],...d};}
  else if(isRec&&recN>1&&isIncome){
    // Recurring income: same value, same day, next months
    const gi=uid(),mi=MO.indexOf(d.month);
    for(let i=0;i<recN;i++){
      const m2=(mi+i)%12;
      let iDate="";
      if(payDate){try{const pd=new Date(payDate+"T12:00:00");pd.setMonth(pd.getMonth()+i);iDate=pd.toISOString().split("T")[0];}catch{}}
      S.entries.push({id:uid(),kind:"income",person:d.person,month:MO[m2],date:iDate,payDate:iDate,category:d.category,group:d.group,desc:desc,value:val,type:"",pay:d.pay,paid:i===0?isPaid:false,iG:gi});
    }
  }
  else if(isI2&&iN>1){
    const gi=uid(),mi=MO.indexOf(d.month),pv=Math.round(val/iN*100)/100;
    for(let i=0;i<iN;i++){
      const m2=(mi+i)%12;
      let iPayDate="";
      if(d.payDate){try{const pd=new Date(d.payDate+"T12:00:00");pd.setMonth(new Date(d.payDate+"T12:00:00").getMonth()+i);iPayDate=pd.toISOString().split("T")[0];}catch{}}
      S.entries.push({id:uid(),kind,person:d.person,month:MO[m2],date:i===0?d.date:"",payDate:iPayDate,category:d.category,group:d.group,desc:`${desc} ${i+1}/${iN}`,value:pv,type:d.type||"Fixo",pay:d.pay,paid:false,iC:i+1,iT:iN,iG:gi});
    }
  }
  else S.entries.push({id:uid(),...d});
  sv();cM();
}

function rC(k,i){S.cfg[k].splice(i,1);sv();R();}
function aC(k,t){const v=prompt(t);if(!v?.trim())return;S.cfg[k].push(v.trim());sv();R();}
function aCat(){const n=prompt("Nome:");if(!n?.trim())return;const i=prompt("Emoji:")||"📌";S.cfg.cats.push({n:n.trim(),i:i.trim(),c:PC[S.cfg.cats.length%PC.length]});sv();R();}
function aIC(){const n=prompt("Nome:");if(!n?.trim())return;const i=prompt("Emoji:")||"💰";S.cfg.incCats.push({n:n.trim(),i:i.trim(),c:PC[S.cfg.incCats.length%PC.length]});sv();R();}

// ── Renomear item de lista (persons, groups, pay) e propagar para entries
function rnC(k,i){
  const old=S.cfg[k][i];
  const nw=prompt("Novo nome:",old);
  if(!nw?.trim()||nw.trim()===old)return;
  const t=nw.trim();
  S.cfg[k][i]=t;
  const f=k==='persons'?'person':k==='groups'?'group':'pay';
  let n=0;S.entries.forEach(e=>{if(e[f]===old){e[f]=t;n++;}});
  sv();R();
  if(n)console.log(`[rnC] ${n} lançamentos atualizados: ${old} → ${t}`);
}
// ── Renomear categoria (cats, incCats) e propagar para entries
function rnCat(k,i){
  const old=S.cfg[k][i].n;
  const nw=prompt("Novo nome:",old);
  if(!nw?.trim()||nw.trim()===old)return;
  const t=nw.trim();
  S.cfg[k][i].n=t;
  let n=0;S.entries.forEach(e=>{if(e.category===old){e.category=t;n++;}});
  sv();R();
  if(n)console.log(`[rnCat] ${n} lançamentos atualizados: ${old} → ${t}`);
}

function xCSV(){
  const f=gF();if(!f.length){alert("Sem dados.");return;}
  let c="Tipo,Data Gasto,Dt. Pagamento,Pessoa,Mês,Categoria,Grupo,Descrição,Pagamento,Valor,Classificação,Status\n";

  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+c],{type:"text/csv;charset=utf-8;"}));a.download="financas_"+new Date().toISOString().slice(0,10)+".csv";a.click();

// ── Backup JSON
function xJSON(){

// ── Restaurar JSON
function iJSON(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=function(){
    const f=this.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=function(){
      try{
        const bk=JSON.parse(rd.result);
        if(!bk.entries||!Array.isArray(bk.entries)){alert("Arquivo inválido.");return;}
        const n=bk.entries.length;
        if(!confirm("Encontrados "+n+" lançamentos no backup.\n\nIsso vai SUBSTITUIR todos os dados atuais.\nDeseja continuar?"))return;
        hPush();S.entries=bk.entries;
        if(bk.cfg)S.cfg={...S.cfg,...bk.cfg};
        sv();R();
        alert("Backup restaurado com sucesso! "+n+" lançamentos carregados.");
      }catch(e){alert("Erro ao ler arquivo: "+e.message);}
    };rd.readAsText(f);
  };inp.click();
}

// ── Importar CSV
function iCSV(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".csv";
  inp.onchange=function(){
    const f=this.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=function(){
      try{
        const lines=rd.result.replace(/\r\n/g,"\n").split("\n").filter(l=>l.trim());
        if(lines.length<2){alert("CSV vazio.");return;}
        const hdr=lines[0].toLowerCase();
        const hasHeader=hdr.includes("tipo")||hdr.includes("descri")||hdr.includes("valor");
        const start=hasHeader?1:0;
        // Detecta formato novo (com payDate, 12 colunas) ou antigo (11 colunas)
        const firstRow=lines[start].split(",");const newFmt=firstRow.length>=12;
        let added=0;
        for(let i=start;i<lines.length;i++){
          const row=[];let cur="",inQ=false;
          for(let j=0;j<lines[i].length;j++){const ch=lines[i][j];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){row.push(cur.trim());cur="";}else{cur+=ch;}}
          row.push(cur.trim());
          if(row.length<9)continue;
          let date,payDate,person,month,category,group,desc,pay,valStr,type;
          if(newFmt){
            [,date,payDate,person,month,category,group,desc,pay,valStr,type]=row;
          } else {
            [,date,person,month,category,group,desc,pay,valStr,type]=row;payDate="";
          }
          const val=parseFloat((valStr||"").replace(",","."));
          if(isNaN(val)||val<=0)continue;
          S.entries.push({id:uid(),kind:row[0].toLowerCase().includes("receita")?"income":"expense",date:date||"",payDate:payDate||"",person:person||S.cfg.persons[0]||"",month:month||MO[new Date().getMonth()],category:category||"Outros",group:group||"",desc:desc||"Importado",pay:pay||"",value:val,type:type||"Essencial"});
          added++;
        }
        if(added===0){alert("Nenhum lançamento válido encontrado no CSV.");return;}
        hPush();sv();R();alert(added+" lançamentos importados com sucesso!");
      }catch(e){alert("Erro ao ler CSV: "+e.message);}
    };rd.readAsText(f,"UTF-8");
  };inp.click();
}

function clearAll(){if(!confirm("⚠️ Apagar TODOS os lançamentos?\nEssa ação pode ser desfeita com o botão Desfazer."))return;hPush();S.entries=[];sv();R();}

ldZoom();ldTheme();ld();window.addEventListener("resize",()=>requestAnimationFrame(R));
setTimeout(()=>{document.querySelector('.app').style.zoom=(zoomLvl/100);},100);
document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key==="z"&&!e.shiftKey){e.preventDefault();undo();}if((e.ctrlKey||e.metaKey)&&(e.key==="y"||(e.key==="z"&&e.shiftKey))){e.preventDefault();redo();}});
</script>
